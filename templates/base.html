<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}基金分析系统{% endblock %}</title>
  <!-- Bootstrap 5 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Plotly.js -->
  <script src="{{ url_for('static', filename='vendor/plotly.min.js') }}"></script>
  <!-- Custom -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark border-bottom border-secondary px-3">
  <a class="navbar-brand fw-bold text-warning" href="{{ url_for('index') }}">
    <i class="bi bi-graph-up-arrow me-1"></i>基金分析系统
  </a>
  <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
    <span class="navbar-toggler-icon"></span>
  </button>
  <div class="collapse navbar-collapse" id="navMenu">
    <ul class="navbar-nav ms-auto">
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
           href="{{ url_for('index') }}">
          <i class="bi bi-house me-1"></i>看板
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.endpoint == 'news' %}active{% endif %}"
           href="{{ url_for('news') }}">
          <i class="bi bi-newspaper me-1"></i>新闻
        </a>
      </li>
    </ul>
  </div>
</nav>

<!-- Flash messages -->
<div class="container-fluid px-4 pt-3">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}
</div>

<!-- Main content -->
<main class="container-fluid px-4 pb-5">
  {% block content %}{% endblock %}
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
